<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<title>Project Dashboard · Mo · MassJedi</title>
<!--
  Shared per-project dashboard template (Mission Control v2).
  Copy this file unchanged into  <your-repo>/dashboard/index.html
  It reads ../.mc/project.json and renders identity, phases, SWOT and decisions.
  Works when the repo is served locally (python -m http.server, VS Code Live Server, etc.).
-->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23060608'/%3E%3Cpath d='M36 8 L20 36 H31 L28 56 L46 26 H34 Z' fill='%23c8fa3c'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#060608; --surface:#0f1117; --surface2:#14161e;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15);
    --text:#f4f5f7; --dim:#a7abb6; --mute:#6a6f7c;
    --volt:#c8fa3c; --cyan:#1fe3ff; --violet:#6f5cff;
    --hi:#ff5d6c; --med:#f5c451; --lo:#5b6472; --ok:#46d39a;
    --grad:linear-gradient(100deg,var(--volt),var(--cyan));
    --font:"Space Grotesk",system-ui,sans-serif; --body:"Inter",system-ui,sans-serif; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--body);line-height:1.5;min-height:100vh;
    background-image:radial-gradient(60vw 50vw at 85% -10%,rgba(111,92,255,.14),transparent 60%),
      radial-gradient(50vw 40vw at 5% 5%,rgba(31,227,255,.08),transparent 60%)}
  a{color:inherit}
  .wrap{max-width:1080px;margin:0 auto;padding:28px clamp(16px,4vw,48px) 70px}
  .back{font-family:var(--font);font-size:13px;color:var(--mute);display:inline-block;margin-bottom:18px}
  .back:hover{color:var(--volt)}
  header{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
  .emoji{font-size:46px;line-height:1}
  h1{font-family:var(--font);font-weight:600;font-size:clamp(24px,3.4vw,36px);letter-spacing:-.01em}
  .tagline{color:var(--dim);font-size:15px;margin-top:4px;max-width:60ch}
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .pill{font-family:var(--font);font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    padding:4px 11px;border-radius:100px;border:1px solid var(--line2);color:var(--dim)}
  .pill.active{color:var(--ok);border-color:rgba(70,211,154,.4)}
  .pill.paused{color:var(--med);border-color:rgba(245,196,81,.4)}
  .pill.shipped{color:var(--cyan);border-color:rgba(31,227,255,.4)}
  .pill.hi{color:var(--hi);border-color:rgba(255,93,108,.4)}
  .pill.lock{color:var(--med)}
  .links{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 28px}
  .links a{font-family:var(--font);font-size:13px;border:1px solid var(--line2);border-radius:100px;
    padding:8px 15px;transition:.2s}
  .links a:hover{border-color:var(--volt);color:var(--volt)}
  .overall{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px}
  .overall .row{display:flex;align-items:center;gap:14px}
  .overall .pct{font-family:var(--font);font-weight:600;font-size:30px;min-width:84px}
  .bar{flex:1;height:10px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--grad);border-radius:100px}
  .next{margin-top:14px;font-family:var(--font);font-size:14px;color:var(--dim)}
  .next b{color:var(--cyan);font-weight:500}
  h2{font-family:var(--font);font-weight:600;font-size:18px;margin:30px 0 14px;letter-spacing:-.01em}
  .phase{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px}
  .phase.active{border-color:rgba(200,250,60,.3)}
  .phase-top{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .phase-title{font-family:var(--font);font-weight:600;font-size:16px;flex:1}
  .phase-pct{font-family:var(--font);font-weight:600;font-size:14px;color:var(--dim)}
  .phase .bar{height:6px;margin:8px 0 12px}
  .subs{list-style:none;display:grid;gap:6px}
  .subs li{display:flex;align-items:center;gap:9px;font-size:14px;color:var(--dim)}
  .subs li.done{color:var(--mute);text-decoration:line-through}
  .box{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--line2);flex-shrink:0;display:grid;place-items:center;font-size:11px;color:var(--bg)}
  .subs li.done .box{background:var(--volt);border-color:var(--volt)}
  .swot{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .quad{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .quad h3{font-family:var(--font);font-size:12px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
  .quad.s h3{color:var(--ok)} .quad.w h3{color:var(--hi)} .quad.o h3{color:var(--cyan)} .quad.t h3{color:var(--med)}
  .quad ul{list-style:none;display:grid;gap:5px} .quad li{font-size:13.5px;color:var(--dim);padding-left:14px;position:relative}
  .quad li::before{content:"–";position:absolute;left:0;color:var(--mute)}
  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;font-size:13.5px}
  th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-family:var(--font);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute)}
  td{color:var(--dim)} tr:last-child td{border-bottom:none} td b{color:var(--text);font-weight:500}
  .empty{color:var(--mute);font-size:14px;font-style:italic}
  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--line);color:var(--mute);font-family:var(--font);font-size:12px}
  .err{background:var(--surface);border:1px solid rgba(255,93,108,.4);border-radius:var(--radius);padding:22px;color:var(--dim);font-size:14px}
  .err code{color:var(--volt);font-family:var(--font)}
  @media(max-width:640px){.swot{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <a class="back" href="#" onclick="history.length>1?history.back():null;return false;">&larr; back</a>
  <div id="root"><p class="empty">Loading project…</p></div>
  <footer>🛰️ Mission Control · per-project dashboard · reads <code>.mc/project.json</code></footer>
</div>

<script>
(function(){
  "use strict";
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function clamp(n){ n=parseInt(n,10); return isNaN(n)?0:Math.max(0,Math.min(100,n)); }

  function render(p){
    var statusCls = (p.status||"").toLowerCase();
    var pills = '<span class="pill '+esc(statusCls)+'">'+esc(p.status||"—")+'</span>'+
      '<span class="pill '+(p.priority==="high"?"hi":"")+'">'+esc(p.priority||"med")+' priority</span>'+
      (p.private?'<span class="pill lock">🔒 private</span>':"");

    var L=p.links||{};
    var links="";
    if(L.github)  links+='<a href="'+esc(L.github)+'" target="_blank" rel="noopener">GitHub ↗</a>';
    if(L.board)   links+='<a href="'+esc(L.board)+'" target="_blank" rel="noopener">Board ↗</a>';
    if(L.obsidian)links+='<a href="'+esc(L.obsidian)+'" target="_blank" rel="noopener">Notes ↗</a>';
    if(L.docs)    links+='<a href="../'+esc(L.docs)+'" target="_blank">PROJECT.md ↗</a>';

    var prog = clamp(p.progress);
    var overall='<div class="overall"><div class="row"><div class="pct">'+(p.progress==null?"n/a":prog+"%")+'</div>'+
      '<div class="bar"><i style="width:'+(p.progress==null?0:prog)+'%"></i></div></div>'+
      (p.nextAction?'<div class="next">▸ next: <b>'+esc(p.nextAction)+'</b></div>':"")+'</div>';

    var phases="";
    if(p.phases&&p.phases.length){
      phases='<h2>Phases</h2>'+p.phases.map(function(ph){
        var active=(ph.status==="active")||(ph.id&&ph.id===p.currentPhase);
        var subs=(ph.subphases||[]).map(function(s){
          return '<li class="'+(s.done?"done":"")+'"><span class="box">'+(s.done?"✓":"")+'</span>'+esc(s.title)+'</li>';
        }).join("");
        var pp=clamp(ph.progress);
        return '<div class="phase '+(active?"active":"")+'"><div class="phase-top">'+
          '<span class="phase-title">'+esc(ph.title)+(active?' &larr; current':'')+'</span>'+
          '<span class="phase-pct">'+pp+'%</span></div>'+
          '<div class="bar"><i style="width:'+pp+'%"></i></div>'+
          (subs?'<ul class="subs">'+subs+'</ul>':"")+'</div>';
      }).join("");
    }

    var sw=p.swot||{};
    function quad(cls,title,arr){
      var items=(arr&&arr.length)?arr.map(function(x){return '<li>'+esc(x)+'</li>';}).join(""):'<li class="empty">—</li>';
      return '<div class="quad '+cls+'"><h3>'+title+'</h3><ul>'+items+'</ul></div>';
    }
    var swot="";
    if(sw.strengths||sw.weaknesses||sw.opportunities||sw.threats){
      swot='<h2>SWOT</h2><div class="swot">'+quad("s","Strengths",sw.strengths)+quad("w","Weaknesses",sw.weaknesses)+
        quad("o","Opportunities",sw.opportunities)+quad("t","Threats",sw.threats)+'</div>';
    }

    var decisions="";
    var dec=(p.decisions||[]).filter(function(d){return d&&(d.decision||d.why);});
    if(dec.length){
      decisions='<h2>Decisions</h2><table><tr><th>Date</th><th>Decision</th><th>Why</th><th>Rejected</th></tr>'+
        dec.map(function(d){return '<tr><td>'+esc(d.date||"")+'</td><td><b>'+esc(d.decision||"")+'</b></td>'+
          '<td>'+esc(d.why||"")+'</td><td>'+esc((d.rejected||[]).join(", "))+'</td></tr>';}).join("")+'</table>';
    }

    document.getElementById("root").innerHTML=
      '<header><div class="emoji">'+esc(p.emoji||"📦")+'</div><div><h1>'+esc(p.name||p.id||"Project")+'</h1>'+
      (p.tagline?'<div class="tagline">'+esc(p.tagline)+'</div>':"")+'<div class="pills">'+pills+'</div></div></header>'+
      (links?'<div class="links">'+links+'</div>':"")+overall+phases+swot+decisions;
    document.title=(p.name||p.id||"Project")+" · Dashboard";
  }

  function showError(msg){
    document.getElementById("root").innerHTML='<div class="err">'+msg+'</div>';
  }

  // Prefer an injected window.MC_PROJECT (works over file://); else fetch the JSON (served locally).
  if(window.MC_PROJECT){ render(window.MC_PROJECT); return; }
  fetch("../.mc/project.json?t="+Date.now())
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(function(){
      showError("Couldn't load <code>../.mc/project.json</code>.<br><br>"+
        "Open this dashboard through a local server (it can't read the file via <code>file://</code>):<br>"+
        "<code>python -m http.server</code> from the repo root, then browse to <code>/dashboard/</code>.");
    });
})();
</script>
</body>
</html>
